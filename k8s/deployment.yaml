apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rate-limiter-api
  template:
    metadata:
      labels:
        app: rate-limiter-api
    spec:
      containers:
        - name: rate-limiter-api
          image: rate-limiter-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080